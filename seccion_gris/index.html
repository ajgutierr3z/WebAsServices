<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Negocios - Villahermosa</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 font-sans min-h-screen">

    <div class="container mx-auto px-4 py-8 max-w-5xl">
        <header class="mb-8 text-center md:text-left border-b border-slate-200 pb-4">
            <h1 class="text-3xl font-bold text-slate-800">Directorio Local de Villahermosa</h1>
            <p class="text-slate-500 text-sm">Simulador de gestión de comercios sin afectación a plataformas externas</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="bg-white p-6 rounded-lg shadow-sm border border-slate-200 h-fit">
                <h2 id="form-title" class="text-xl font-semibold text-slate-700 mb-4">Registrar Negocio</h2>
                
                <form id="business-form" class="space-y-4">
                    <input type="hidden" id="biz-id">

                    <div>
                        <label class="block text-xs font-medium text-slate-600 uppercase mb-1">Nombre Comercial</label>
                        <input type="text" id="biz-nombre" required class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-600 uppercase mb-1">Giro / Categoría</label>
                        <input type="text" id="biz-categoria" required class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm" placeholder="Ej. Restaurante, Café">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-600 uppercase mb-1">Zona / Colonia</label>
                        <input type="text" id="biz-zona" required class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm" placeholder="Ej. Tabasco 2000, Centro">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-600 uppercase mb-1">Teléfono de Contacto</label>
                        <input type="tel" id="biz-telefono" class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                    </div>

                    <div class="flex gap-2 pt-2">
                        <button type="submit" id="btn-submit" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium py-2 rounded-md transition shadow-sm">
                            Guardar Datos
                        </button>
                        <button type="button" id="btn-cancelar" class="hidden bg-slate-200 hover:bg-slate-300 text-slate-700 text-sm font-medium py-2 px-3 rounded-md transition">
                            Cancelar
                        </button>
                    </div>
                </form>
            </div>

            <div class="md:col-span-2 bg-white rounded-lg shadow-sm border border-slate-200 overflow-hidden">
                <div class="px-6 py-4 border-b border-slate-200 bg-slate-50 flex justify-between items-center">
                    <h2 class="font-semibold text-slate-700">Registros en el Servidor</h2>
                    <span id="contador" class="bg-blue-100 text-blue-800 text-xs font-semibold px-2.5 py-0.5 rounded">0 Establecimientos</span>
                </div>
                
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse text-sm">
                        <thead>
                            <tr class="bg-slate-100 text-slate-600 uppercase text-xs font-semibold border-b border-slate-200">
                                <th class="px-6 py-3">Negocio</th>
                                <th class="px-6 py-3">Ubicación</th>
                                <th class="px-6 py-3 text-right">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-negocios" class="divide-y divide-slate-100 text-slate-700">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
