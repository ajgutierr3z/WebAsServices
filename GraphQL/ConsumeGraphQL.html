<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rick and Morty - GraphQL</title>
  <style>
    /* Un CSS rápido para que se vea genial */
    body {
      background-color: #202329;
      color: white;
      font-family: sans-serif;
      margin: 0;
      padding: 20px;
    }
    h1 {
      text-align: center;
      color: #00ff97;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .tarjeta {
      background-color: #3c3e44;
      border-radius: 8px;
      overflow: hidden;
      text-align: center;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    }
    .tarjeta img {
      width: 100%;
      height: auto;
    }
    .tarjeta info {
      padding: 10px;
    }
    .status {
      font-size: 0.9em;
      color: #9e9e9e;
    }
    .Alive { color: #55cc44; }
    .Dead { color: #d63d2e; }
  </style>
</head>
<body>

  <h1>Personajes de Rick and Morty (GraphQL)</h1>
  
  <div id="contenedor-personajes" class="grid"></div>

  <script>
    const URL_API = "https://rickandmortyapi.com/graphql";
    const QUERY_PERSONAJES = `
      query {
        characters(page: 1) {
          results {
            id
            name
            status
            image
          }
        }
      }
    `;

    async function pintarPersonajes() {
      try {
        const respuesta = await fetch(URL_API, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ query: QUERY_PERSONAJES }),
        });

        const resultado = await respuesta.json();
        const personajes = resultado.data.characters.results;

        // Seleccionamos el contenedor HTML
        const contenedor = document.getElementById("contenedor-personajes");

        // Recorremos el array de personajes y creamos el HTML para cada uno
        personajes.forEach(personaje => {
          const tarjetaHTML = `
            <div class="tarjeta">
              <img src="${personaje.image}" alt="${personaje.name}">
              <div class="info">
                <h3>${personaje.name}</h3>
                <p class="status">Estado: <span class="${personaje.status}">${personaje.status}</span></p>
              </div>
            </div>
          `;
          // Lo agregamos al contenedor
          contenedor.innerHTML += tarjetaHTML;
        });

      } catch (error) {
        console.error("Error al pintar los datos:", error);
      }
    }

    // Llamamos a la función al cargar la página
    pintarPersonajes();
  </script>
</body>
</html>
