<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rick and Morty - GraphQL</title>
  <style>
    /* Un CSS rápido para que se vea genial */
    body {
      background-color: rgb(221, 216, 216);
      color: white;
      font-family: sans-serif;
      margin: 0;
      padding: 20px;
    }
    h1 {
      display: inline-block;      
      background-color: white;
      padding: 15px;
      border-radius: 20px;
      text-align: center;
      color: black;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .tarjeta {
      /*background-color: #3c3e44;*/
      border-radius: 8px;
      overflow: hidden;
      text-align: center;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    }
    .tarjeta img {
      width: 100%;
      height: auto;
    }
    .tarjeta info {
      padding: 10px;
    }
    .status {
      font-size: 0.9em;
      color: white;
    }
    .Alive { background-color: #55cc44; }
    .Dead { background-color: #d63d2e; }
    .centrar{
      display: flex;
      justify-content: space-evenly;
    }
    .boton{
      font-size: 1.5em;
      color: white;
      padding: 15px;
      border-radius: 15px;
      border: 2px black solid;
      cursor: pointer;
    }
    #btn-vivos{
      background-color: #55cc44;
    }
    #btn-muertos{
      background-color: #d63d2e;
    }
    #btn-desc{
      background-color: #3c3e44;
    }
    #btn-todos{
      background-color: blue;
    }
  </style>
</head>
<body>
  <div class="centrar">
    <h1>Personajes de Rick and Morty (GraphQL)</h1>
  </div>

  <div class="centrar" style="margin-bottom: 20px;">
    <button class="boton" id="btn-vivos" onclick="vivos()">Vivos</button>
    <button class="boton" id="btn-muertos" onclick="muestos()">Muertos</button>
    <button class="boton" id="btn-desc" onclick="desc()">Desconocido</button>
    <button class="boton" id="btn-todos" onclick="todos()">Todos</button>
  </div>
  <div id="contenedor-personajes" class="grid"></div>

  <script>
    const URL_API = "https://rickandmortyapi.com/graphql";
    const QUERY_PERSONAJES = `
      query {
        characters(page: 1) {
          results {
            id
            name
            status
            image
          }
        }
      }
    `;
    var todos = true;
    var dibujar = "";
    async function pintarPersonajes() {
      try {
        const respuesta = await fetch(URL_API, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ query: QUERY_PERSONAJES }),
        });

        const resultado = await respuesta.json();
        const personajes = resultado.data.characters.results;

        // Seleccionamos el contenedor HTML
        const contenedor = document.getElementById("contenedor-personajes");

        // Recorremos el array de personajes y creamos el HTML para cada uno
        personajes.forEach(personaje => {
          if (personaje.status == "Alive") {
            var statusColor = "#55cc44";
          }else if(personaje.status == "Dead"){
            var statusColor = "#d63d2e";
          }else{
            var statusColor = "#3c3e44";
          }
          const tarjetaHTML = `
            <div class="tarjeta" style="background-color:${statusColor}">
              <img src="${personaje.image}" alt="${personaje.name}">
              <div class="info">
                <h3>${personaje.name}</h3>
                <p class="status">Estado: <span>${personaje.status}</span></p>
              </div>
            </div>
          `;
          // Lo agregamos al contenedor
          if (dibujar == `${personaje.status}` || todos) {
            contenedor.innerHTML += tarjetaHTML;  
          }          
        });

      } catch (error) {
        console.error("Error al pintar los datos:", error);
      }
    }

    function vivos() {
      dibujar = "Alive";
      todos = false;
      const contenedor = document.getElementById("contenedor-personajes");
      contenedor.innerHTML = "";
      pintarPersonajes();  
    }

    function muertos() {
      dibujar = "Dead";
      todos = false;
      const contenedor = document.getElementById("contenedor-personajes");
      contenedor.innerHTML = "";
      pintarPersonajes();  
    }

    function desc() {
      dibujar = "Unknown";
      todos = false;
      const contenedor = document.getElementById("contenedor-personajes");
      contenedor.innerHTML = "";
      pintarPersonajes();  
    }

    function todos() {
      dibujar = "todos";
      todos = true;
      const contenedor = document.getElementById("contenedor-personajes");
      contenedor.innerHTML = "";
      pintarPersonajes();  
    }

    // Llamamos a la función al cargar la página
    pintarPersonajes();
  </script>
</body>
</html>
