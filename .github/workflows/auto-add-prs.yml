name: Auto-agregar PRs a Backlog

on:
  pull_request:
    types: [opened, reopened]

jobs:
  add-to-project:
    runs-on: ubuntu-latest
    steps:
      - name: Obtener ID del proyecto y campo Status
        id: get-project-data
        run: |
          # Obtener el ID del proyecto V2
          PROJECT_ID=$(gh api graphql -f query='
            query($owner: String!, $repo: String!) {
              repository(owner: $owner, name: $repo) {
                projectV2(number: 2) {
                  id
                  fields(first: 20) {
                    nodes {
                      ... on ProjectV2SingleSelectField {
                        id
                        name
                        options {
                          id
                          name
                        }
                      }
                    }
                  }
                }
              }
            }' -F owner="ajgutierr3z" -F repo="WebAsServices" --jq '.data.repository.projectV2.id')
          
          # Obtener el ID del campo "Status"
          STATUS_FIELD_ID=$(gh api graphql -f query='
            query($owner: String!, $repo: String!) {
              repository(owner: $owner, name: $repo) {
                projectV2(number: 2) {
                  fields(first: 20) {
                    nodes {
                      ... on ProjectV2SingleSelectField {
                        id
                        name
                      }
                    }
                  }
                }
              }
            }' -F owner="ajgutierr3z" -F repo="WebAsServices" --jq '.data.repository.projectV2.fields.nodes[] | select(.name == "Status") | .id')
          
          # Obtener el ID de la opción "Backlog"
          BACKLOG_OPTION_ID=$(gh api graphql -f query='
            query($owner: String!, $repo: String!) {
              repository(owner: $owner, name: $repo) {
                projectV2(number: 2) {
                  fields(first: 20) {
                    nodes {
                      ... on ProjectV2SingleSelectField {
                        id
                        name
                        options {
                          id
                          name
                        }
                      }
                    }
                  }
                }
              }
            }' -F owner="ajgutierr3z" -F repo="WebAsServices" --jq '.data.repository.projectV2.fields.nodes[] | select(.name == "Status") | .options[] | select(.name == "Backlog") | .id')
          
          echo "project_id=$PROJECT_ID" >> $GITHUB_OUTPUT
          echo "status_field_id=$STATUS_FIELD_ID" >> $GITHUB_OUTPUT
          echo "backlog_option_id=$BACKLOG_OPTION_ID" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Agregar PR al proyecto
        run: |
          # Obtener el ID del PR
          PR_NUMBER=${{ github.event.pull_request.number }}
          PR_ID=$(gh api graphql -f query='
            query($owner: String!, $repo: String!, $number: Int!) {
              repository(owner: $owner, name: $repo) {
                pullRequest(number: $number) {
                  id
                }
              }
            }' -F owner="ajgutierr3z" -F repo="WebAsServices" -F number=$PR_NUMBER --jq '.data.repository.pullRequest.id')
          
          # Agregar el PR al proyecto
          gh api graphql -f query='
            mutation($project_id: ID!, $content_id: ID!) {
              addProjectV2ItemById(input: {projectId: $project_id, contentId: $content_id}) {
                item {
                  id
                }
              }
            }' -F project_id="${{ steps.get-project-data.outputs.project_id }}" -F content_id="$PR_ID"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Asignar a columna Backlog
        run: |
          # Obtener el ID del item recién agregado
          ITEM_ID=$(gh api graphql -f query='
            query($project_id: ID!) {
              node(id: $project_id) {
                ... on ProjectV2 {
                  items(first: 1) {
                    nodes {
                      id
                    }
                  }
                }
              }
            }' -F project_id="${{ steps.get-project-data.outputs.project_id }}" --jq '.data.node.items.nodes[0].id')
          
          # Actualizar el campo Status a Backlog
          gh api graphql -f query='
            mutation($item_id: ID!, $field_id: ID!, $option_id: String!) {
              updateProjectV2ItemFieldValue(input: {
                projectId: $project_id
                itemId: $item_id
                fieldId: $field_id
                value: {
                  singleSelectOptionId: $option_id
                }
              }) {
                projectV2Item {
                  id
                }
              }
            }' -F project_id="${{ steps.get-project-data.outputs.project_id }}" \
               -F item_id="$ITEM_ID" \
               -F field_id="${{ steps.get-project-data.outputs.status_field_id }}" \
               -F option_id="${{ steps.get-project-data.outputs.backlog_option_id }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
